name: "Push secrets from 1Password to Azure"

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - "azure-push-secrets-*"
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/push-1password-secrets-to-azure.yaml
      - sync-secrets-azure/Pulumi.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  push-azure-secrets:
    name: "Push Azure Secret"
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4 # v3.0.0

      - name: Load Azure token
        id: op-azure-token
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZDO_PERSONAL_ACCESS_TOKEN: op://pulumi/azure-pulumi-runner/credential

      - uses: pulumi/auth-actions@141415910c3beb54e03b48e9057c204c97b956f2 # v2.1.0
        with:
          organization: conda-forge
          requested-token-type: urn:pulumi:token-type:access_token:personal
          scope: user:conda-forge-bot

      - uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7.0.0
        with:
          command: ${{ github.event_name == 'pull_request' && 'preview' || 'up' }}
          refresh: true
          stack-name: conda-forge/sync-secrets-azure/secrets
          work-dir: "./sync-secrets-azure"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZDO_PERSONAL_ACCESS_TOKEN: ${{ steps.op-azure-token.outputs.AZDO_PERSONAL_ACCESS_TOKEN }}
          AZDO_ORG_SERVICE_URL: https://dev.azure.com/conda-forge
