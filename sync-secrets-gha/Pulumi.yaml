name: sync-secrets-gha
description: sync secrets from 1Password to GH
runtime: yaml
config:
  'pulumi:tags': {value: {'pulumi:template': yaml}}
  github:owner:
        value: conda-forge
variables:
  # get 1password secrets
  azure-token:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: azure-token
        vault: pulumi
  cf-admin-github-token:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: cf-admin-github-token
        vault: pulumi
  cf-bot-dh-password:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: cf-bot-dh-password
        vault: pulumi
  cf-curator-app-id:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: cf-curator-app-id
        vault: pulumi
  cf-curator-private-key:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: cf-curator-private-key
        vault: pulumi
  cf-daemon-quay-password:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: cf-daemon-quay-password
        vault: pulumi
  cf-daemon-travis-token:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: cf-daemon-travis-token
        vault: pulumi
  cf-linter-travis-token:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: cf-linter-travis-token
        vault: pulumi
  cf-webservices-token:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: cf-webservices-token
        vault: pulumi
  cirun-api-key:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: cirun-api-key
        vault: pulumi
  conda-forge-quay-api-key:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: conda-forge-quay-api-key
        vault: pulumi
  heroku-email:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: heroku-email
        vault: pulumi
  heroku-api-key:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: heroku-api-key
        vault: pulumi
  heroku-only-staging-binstar-token:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: heroku-only-staging-binstar-token
        vault: pulumi
  prod-binstar-token:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: prod-binstar-token
        vault: pulumi
  post-staging-binstar-token:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: post-staging-binstar-token
        vault: pulumi
  pulumi-1password-service-account:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: pulumi-1password-service-account
        vault: pulumi
  staging-binstar-token:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: staging-binstar-token
        vault: pulumi
  read-conda-forge-gh-org-as-admin-token:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: read-conda-forge-gh-org-as-admin-token
        vault: pulumi
  certificate-macos-application:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: certificate-macos-application
        vault: pulumi
  certificate-macos-installer:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: certificate-macos-installer
        vault: pulumi
  apple-notarization-issuer-id:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: apple-notarization-issuer-id
        vault: pulumi
  apple-notarization-key-id:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: apple-notarization-key-id
        vault: pulumi
  apple-notarization-authkey-base64:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: apple-notarization-authkey-base64
        vault: pulumi
  windows-ci-azure-client-id:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: windows-ci-azure-client-id
        vault: pulumi
  windows-ci-azure-tenant-id:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: windows-ci-azure-tenant-id
        vault: pulumi
  windows-ci-azure-subscription-id:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: windows-ci-azure-subscription-id
        vault: pulumi
  windows-signing-account-name:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: windows-signing-account-name
        vault: pulumi
  windows-signing-azure-client-id:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: windows-signing-azure-client-id
        vault: pulumi
  windows-signing-azure-client-secret-id:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: windows-signing-azure-client-secret-id
        vault: pulumi
  windows-signing-azure-client-secret-value:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: windows-signing-azure-client-secret-value
        vault: pulumi
  windows-signing-azure-subscription-id:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: windows-signing-azure-subscription-id
        vault: pulumi
  windows-signing-azure-tenant-id:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: windows-signing-azure-tenant-id
        vault: pulumi
  windows-signing-endpoint:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: windows-signing-endpoint
        vault: pulumi
  windows-signing-profile-name:
    fn::invoke:
      function: onepassword:getItem
      arguments:
        title: windows-signing-profile-name
        vault: pulumi
  # get GH repos
  repo-admin-migrations:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/admin-migrations
  repo-admin-requests:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/admin-requests
  repo-automerge-action:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/automerge-action
  repo-by-the-numbers:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/by-the-numbers
  repo-core-notes:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/core-notes
  repo-conda-forge-bot:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/conda-forge-bot
  repo-conda-forge-feedstock-ops:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/conda-forge-feedstock-ops
  repo-conda-forge-webservices:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/conda-forge-webservices
  repo-docker-images:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/docker-images
  repo-infrastructure:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/infrastructure
  repo-webservices-dispatch-action:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/webservices-dispatch-action
  repo-governance:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/governance
  repo-miniforge:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/miniforge
  repo-miniforge-images:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/miniforge-images
  repo-cirun:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/.cirun
  repo-staged-recipes:
    fn::invoke:
      function: github:getRepository
      arguments:
        fullName: conda-forge/staged-recipes
resources:
  onepassword-provider:
    type: pulumi:providers:onepassword
    options:
      version: 1.1.4
      pluginDownloadURL: github://api.github.com/1Password/

  # Secret: AZURE_TOKEN
  gh-org-secret-azure-token:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: AZURE_TOKEN
      value: ${azure-token.credential}
      visibility: selected
  gh-org-secret-azure-token-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-azure-token.secretName}
      selectedRepositoryIds:
        - ${repo-admin-requests.repoId}
        - ${repo-admin-migrations.repoId}

  # Secret: CF_ADMIN_GITHUB_TOKEN
  gh-org-secret-cf-admin-github-token:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: CF_ADMIN_GITHUB_TOKEN
      value: ${cf-admin-github-token.credential}
      visibility: selected
  gh-org-secret-cf-admin-github-token-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-cf-admin-github-token.secretName}
      selectedRepositoryIds:
        - ${repo-admin-requests.repoId}
        - ${repo-admin-migrations.repoId}
        - ${repo-conda-forge-webservices.repoId}

  # Secret: CF_BOT_DH_PASSWORD
  gh-org-cf-bot-dh-password:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: CF_BOT_DH_PASSWORD
      value: ${cf-bot-dh-password.password}
      visibility: selected
  gh-org-cf-bot-dh-password-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-cf-bot-dh-password.secretName}
      selectedRepositoryIds:
        - ${repo-conda-forge-webservices.repoId}
        - ${repo-docker-images.repoId}
        - ${repo-conda-forge-feedstock-ops.repoId}
        - ${repo-miniforge-images.repoId}

  # Secret: CF_CURATOR_APP_ID
  gh-org-secret-cf-curator-app-id:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: CF_CURATOR_APP_ID
      value: ${cf-curator-app-id.credential}
      visibility: selected
  gh-org-secret-cf-curator-app-id-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-cf-curator-app-id.secretName}
      selectedRepositoryIds:
        - ${repo-admin-requests.repoId}
        - ${repo-admin-migrations.repoId}
        - ${repo-automerge-action.repoId}
        - ${repo-by-the-numbers.repoId}
        - ${repo-core-notes.repoId}
        - ${repo-conda-forge-webservices.repoId}
        - ${repo-webservices-dispatch-action.repoId}

  # Secret: CF_CURATOR_PRIVATE_KEY
  gh-org-secret-cf-curator-private-key:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: CF_CURATOR_PRIVATE_KEY
      value: ${cf-curator-private-key.privateKey}
      visibility: selected
  gh-org-secret-cf-curator-private-key-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-cf-curator-private-key.secretName}
      selectedRepositoryIds:
        - ${repo-admin-requests.repoId}
        - ${repo-admin-migrations.repoId}
        - ${repo-automerge-action.repoId}
        - ${repo-by-the-numbers.repoId}
        - ${repo-core-notes.repoId}
        - ${repo-conda-forge-webservices.repoId}
        - ${repo-webservices-dispatch-action.repoId}

  # Secret: CF_DAEMON_QUAY_PASSWORD
  gh-org-secret-cf-daemon-quay-password:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: CF_DAEMON_QUAY_PASSWORD
      value: ${cf-daemon-quay-password.credential}
      visibility: selected
  gh-org-secret-cf-daemon-quay-password-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-cf-daemon-quay-password.secretName}
      selectedRepositoryIds:
        - ${repo-conda-forge-webservices.repoId}
        - ${repo-docker-images.repoId}
        - ${repo-conda-forge-bot.repoId}
        - ${repo-miniforge-images.repoId}

  # Secret: CF_DAEMON_TRAVIS_TOKEN
  gh-org-secret-cf-daemon-travis-token:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: CF_DAEMON_TRAVIS_TOKEN
      value: ${cf-daemon-travis-token.credential}
      visibility: selected
  gh-org-secret-cf-daemon-travis-token-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-cf-daemon-travis-token.secretName}
      selectedRepositoryIds:
        - ${repo-admin-migrations.repoId}

  # Secret: CF_LINTER_TRAVIS_TOKEN
  gh-org-secret-cf-linter-travis-token:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: CF_LINTER_TRAVIS_TOKEN
      value: ${cf-linter-travis-token.credential}
      visibility: selected
  gh-org-secret-cf-linter-travis-token-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-cf-linter-travis-token.secretName}
      selectedRepositoryIds:
        - ${repo-admin-migrations.repoId}

  # Secret: CF_WEBSERVICES_TOKEN
  gh-org-secret-cf-webservices-token:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: CF_WEBSERVICES_TOKEN
      value: ${cf-webservices-token.credential}
      visibility: selected
  gh-org-secret-cf-webservices-token-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-cf-webservices-token.secretName}
      selectedRepositoryIds:
        - ${repo-admin-migrations.repoId}
        - ${repo-conda-forge-webservices.repoId}
        - ${repo-staged-recipes.repoId}

  # repo webhooks
  gh-repo-webhook-staged-recipes-labeler-hook:
    type: github:RepositoryWebhook
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      repository: ${repo-staged-recipes.name}
      active: true
      configuration:
        contentType: json
        insecureSsl: false
        secret: ${cf-webservices-token.credential}
        url: https://conda-forge.herokuapp.com/staged-recipes/labeler-hook
      events:
        - issues
        - issue_comment
        - pull_request

  # org webhooks
  gh-org-webhook-autotickbot-payload:
    type: github:OrganizationWebhook
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      active: true
      configuration:
        contentType: json
        insecureSsl: false
        secret: ${cf-webservices-token.credential}
        url: https://conda-forge.herokuapp.com/autotickbot/payload
      events:
        - push
        - pull_request

  gh-org-webhook-conda-linting-org-hook:
    type: github:OrganizationWebhook
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      active: true
      configuration:
        contentType: json
        insecureSsl: false
        secret: ${cf-webservices-token.credential}
        url: https://conda-forge.herokuapp.com/conda-linting/org-hook
      events:
        - pull_request
        - merge_group

  gh-org-webhook-conda-forge-feedstocks-org-hook:
    type: github:OrganizationWebhook
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      active: true
      configuration:
        contentType: json
        insecureSsl: false
        secret: ${cf-webservices-token.credential}
        url: https://conda-forge.herokuapp.com/conda-forge-feedstocks/org-hook
      events:
        - push

  gh-org-webhook-conda-forge-teams-org-hook:
    type: github:OrganizationWebhook
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      active: true
      configuration:
        contentType: json
        insecureSsl: false
        secret: ${cf-webservices-token.credential}
        url: https://conda-forge.herokuapp.com/conda-forge-teams/org-hook
      events:
        - push

  gh-org-webhook-conda-forge-command-org-hook:
    type: github:OrganizationWebhook
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      active: true
      configuration:
        contentType: json
        insecureSsl: false
        secret: ${cf-webservices-token.credential}
        url: https://conda-forge.herokuapp.com/conda-forge-command/org-hook
      events:
        - issue_comment
        - issues
        - pull_request

  gh-org-webhook-status-monitor-payload:
    type: github:OrganizationWebhook
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      active: true
      configuration:
        contentType: json
        insecureSsl: false
        secret: ${cf-webservices-token.credential}
        url: https://conda-forge.herokuapp.com/status-monitor/payload
      events:
        - check_run
        - check_suite
        - pull_request
        - status

  # Secret: CIRUN_API_KEY
  gh-org-secret-cirun-api-key:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: CIRUN_API_KEY
      value: ${cirun-api-key.credential}
      visibility: selected
  gh-org-secret-cirun-api-key-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-cirun-api-key.secretName}
      selectedRepositoryIds:
        - ${repo-admin-requests.repoId}

  # Secret: CONDA_FORGE_QUAY_API_KEY
  gh-org-secret-conda-forge-quay-api-key:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: CONDA_FORGE_QUAY_API_KEY
      value: ${conda-forge-quay-api-key.credential}
      visibility: selected
  gh-org-secret-conda-forge-quay-api-key-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-conda-forge-quay-api-key.secretName}
      selectedRepositoryIds:
        - ${repo-conda-forge-webservices.repoId}
        - ${repo-docker-images.repoId}
        - ${repo-miniforge-images.repoId}

  # Secret: HEROKU_API_KEY
  gh-org-secret-heroku-api-key:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: HEROKU_API_KEY
      value: ${heroku-api-key.credential}
      visibility: selected
  gh-org-secret-heroku-api-key-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-heroku-api-key.secretName}
      selectedRepositoryIds:
        - ${repo-core-notes.repoId}
        - ${repo-conda-forge-webservices.repoId}

  # Secret: HEROKU_EMAIL
  gh-org-secret-heroku-email:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: HEROKU_EMAIL
      value: ${heroku-email.credential}
      visibility: selected
  gh-org-secret-heroku-email-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-heroku-email.secretName}
      selectedRepositoryIds:
        - ${repo-conda-forge-webservices.repoId}

  # Secret: HEROKU_ONLY_STAGING_BINSTAR_TOKEN
  gh-org-secret-heroku-only-staging-binstar-token:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: HEROKU_ONLY_STAGING_BINSTAR_TOKEN
      value: ${heroku-only-staging-binstar-token.credential}
      visibility: selected
  gh-org-secret-heroku-only-staging-binstar-token-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-heroku-only-staging-binstar-token.secretName}
      selectedRepositoryIds:
        - ${repo-conda-forge-webservices.repoId}

  # Secret: POST_STAGING_BINSTAR_TOKEN
  gh-org-secret-post-staging-binstar-token:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: POST_STAGING_BINSTAR_TOKEN
      value: ${post-staging-binstar-token.credential}
      visibility: selected
  gh-org-secret-post-staging-binstar-token-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-post-staging-binstar-token.secretName}
      selectedRepositoryIds:
        - ${repo-conda-forge-webservices.repoId}

  # Secret: OP_SERVICE_ACCOUNT_TOKEN
  gh-org-secret-op-service-account-token:
    type: github:ActionsOrganizationSecret
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: OP_SERVICE_ACCOUNT_TOKEN
      value: ${pulumi-1password-service-account.credential}
      visibility: selected
  gh-org-secret-op-service-account-token-repos:
    type: github:ActionsOrganizationSecretRepositories
    options:
      protect: false
      retainOnDelete: true
      deleteBeforeReplace: false
    properties:
      secretName: ${gh-org-secret-op-service-account-token.secretName}
      selectedRepositoryIds:
